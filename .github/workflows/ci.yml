name: CI Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      browser:
        description: 'Playwright target to run'
        type: choice
        required: false
        default: chromium
        options:
          - chromium
          - all
          - firefox
          - webkit
          - mobile:chrome
          - mobile:edge
          - mobile:opera

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2+sha512.a90faf6feeab71ad6c6e57f94e0fe1a12f5dcc22cd754db40ae9593eb6a3e0b6b12e3540218bb37ae083404b1f2ce6db2a4121e979829b4aff94b99f49da1cf8
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma schema
        run: pnpm db:generate

      - name: Lint check
        run: pnpm lint:check

      - name: Type check
        run: pnpm test:types

      # Defaults to chromium: `inputs` is empty on pull_request runs.
      - name: Resolve test target
        id: target
        run: |
          case "${{ inputs.browser || 'chromium' }}" in
            chromium)     script="test";              browsers="chromium" ;;
            all)          script="test:all";          browsers="" ;;
            firefox)      script="test:firefox";      browsers="firefox" ;;
            webkit)       script="test:webkit";       browsers="webkit" ;;
            mobile:chrome) script="test:mobile:chrome"; browsers="chromium" ;;
            mobile:edge)  script="test:mobile:edge";  browsers="msedge" ;;
            mobile:opera) script="test:mobile:opera"; browsers="chromium" ;;
          esac
          echo "script=$script" >> "$GITHUB_OUTPUT"
          echo "browsers=$browsers" >> "$GITHUB_OUTPUT"

      # An empty browser list installs every browser, which is what `all` needs.
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps ${{ steps.target.outputs.browsers }}

      # Smoke + boards only until board.test.ts is enabled (see tests/README.md).
      - run: pnpm ${{ steps.target.outputs.script }}
        env:
          CI: true
