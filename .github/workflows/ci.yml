name: Repo Tests

on:
  pull_request:
    - 'main'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2+sha512.a90faf6feeab71ad6c6e57f94e0fe1a12f5dcc22cd754db40ae9593eb6a3e0b6b12e3540218bb37ae083404b1f2ce6db2a4121e979829b4aff94b99f49da1cf8
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma schema
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Lint check
        run: pnpm lint:check

      - name: Type check
        run: pnpm test:types

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      # Smoke + boards only until board.test.ts is enabled (see tests/README.md).
      - run: pnpm test --project=chromium
        env:
          CI: true
